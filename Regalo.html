<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Eterno Amor</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-fondo: #ffafbd;
            --rosa-claro: #ffc3a0;
            --color-amor: #ff4d6d;
            --panda-black: #222;
            --petalo-rosa: #ff758f;
            --centro-amarillo: #ffb703;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, var(--rosa-fondo) 0%, var(--rosa-claro) 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- MARCO CENTRAL --- */
        .centro-fijo {
            position: relative;
            z-index: 100;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 360px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--color-amor);
            font-size: 2.2rem;
            margin: 0 0 15px 0;
        }

        /* --- PANDA REALISTA --- */
        .panda-container {
            position: relative;
            width: 130px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .cabeza-panda {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 50% 50% 45% 45%;
            position: relative;
            z-index: 10;
            box-shadow: inset -3px -6px 10px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.1);
        }

        .oreja {
            width: 42px;
            height: 42px;
            background: var(--panda-black);
            border-radius: 50%;
            position: absolute;
            top: -5px;
            z-index: 5;
        }
        .oreja.izq { left: 2px; }
        .oreja.der { right: 2px; }

        .ojo-negro {
            width: 36px;
            height: 42px;
            background: var(--panda-black);
            border-radius: 50%;
            position: absolute;
            top: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ojo-negro.izq { left: 22px; transform: rotate(10deg); }
        .ojo-negro.der { right: 22px; transform: rotate(-10deg); }

        .brillo-ojo {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: parpadeo 4s infinite;
        }

        @keyframes parpadeo { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        /* --- BOTÓN --- */
        .btn-poema {
            background: var(--color-amor);
            color: white;
            padding: 12px 28px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        /* --- JARDÍN ANIMADO --- */
        #jardin {
            position: fixed;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 180px;
            z-index: 50;
            pointer-events: none;
            display: flex;
            justify-content: center;
        }

        .flor {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            animation: balanceoViento 4s infinite alternate ease-in-out;
        }

        .petalos-wrap { position: relative; width: 50px; height: 50px; }
        .petalo {
            position: absolute;
            width: 25px;
            height: 35px;
            background: radial-gradient(circle, #ff85a1, var(--petalo-rosa));
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            left: 12px;
            transform-origin: bottom center;
        }
        .centro-flor {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--centro-amarillo);
            border-radius: 50%;
            top: 17px;
            left: 17px;
            z-index: 6;
        }
        .tallo { width: 5px; background: linear-gradient(to top, #1b4332, #40916c); border-radius: 3px; }

        @keyframes balanceoViento { from { transform: rotate(-4deg); } to { transform: rotate(4deg); } }

        /* --- LLUVIA Y NUBES --- */
        .particula {
            position: absolute;
            top: -50px;
            pointer-events: none;
            animation: caer linear forwards;
            z-index: 150;
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .nube {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 18px;
            border-radius: 40px;
            color: var(--color-amor);
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            animation: flotarNube linear forwards;
            z-index: 5;
        }

        @keyframes flotarNube { from { left: -200px; } to { left: 110vw; } }
    </style>
</head>
<body onclick="iniciarAudio()">

    <iframe id="musica" width="1" height="1" src="https://www.youtube.com/embed/9v_q6QEQz9A?enablejsapi=1" style="display:none"></iframe>

    <div class="centro-fijo">
        <h1>Para el amor de mi vida</h1>
        
        <div class="panda-container">
            <div class="oreja izq"></div>
            <div class="oreja der"></div>
            <div class="cabeza-panda">
                <div class="ojo-negro izq"><div class="brillo-ojo"></div></div>
                <div class="ojo-negro der"><div class="brillo-ojo"></div></div>
                <div style="width:25px; height:15px; background:#f9f9f9; position:absolute; bottom:15px; left:50%; transform:translateX(-50%); border-radius:50%;">
                    <div style="width:8px; height:5px; background:#333; border-radius:50%; margin:3px auto;"></div>
                </div>
            </div>
        </div>

        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">
            Eres mi dulce universo y la razón de mi sonrisa constante.
        </p>

        <a href="poema.html" class="btn-poema">Ver mi corazón</a>
        <p style="font-size: 0.7rem; color: var(--color-amor); margin-top: 10px;"></p>
    </div>

    <div id="jardin"></div>

    <script>
        function iniciarAudio() {
            const vid = document.getElementById('musica');
            vid.src += "&autoplay=1";
        }

        // Lluvia de flores y corazones
        function crearLluvia() {
            const p = document.createElement('div');
            p.className = 'particula';
            const tipos = ['❤', '🌸', '✨', '💕'];
            p.innerHTML = tipos[Math.floor(Math.random() * tipos.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 20 + 10) + 'px';
            const duracion = Math.random() * 3 + 4;
            p.style.animationDuration = duracion + 's';
            p.style.color = Math.random() > 0.5 ? '#ff4d6d' : '#fff';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), duracion * 1000);
        }
        setInterval(crearLluvia, 300);

        // Nubes con palabras
        const frases = ["Te amo", "Mi dulce universo", "Eres mi destino", "Siempre juntos", "Eres magia", "Mi reina", "Mi sol"];
        function crearNube() {
            const n = document.createElement('div');
            n.className = 'nube';
            n.innerHTML = frases[Math.floor(Math.random() * frases.length)];
            n.style.top = (Math.random() * 40 + 5) + 'vh';
            const dur = Math.random() * 10 + 15;
            n.style.animationDuration = dur + 's';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), dur * 1000);
        }
        setInterval(crearNube, 4000);

        // Jardín de 40 flores
        const jardin = document.getElementById('jardin');
        for(let i=0; i<40; i++) {
            const f = document.createElement('div');
            f.className = 'flor';
            f.style.left = (i * 2.5) + '%';
            const hTallo = Math.random() * 60 + 70;
            f.style.animationDelay = (Math.random() * 2) + 's';
            let phtml = '<div class="petalos-wrap">';
            for(let k=0; k<6; k++) phtml += `<div class="petalo" style="transform:rotate(${k*60}deg)"></div>`;
            phtml += '</div><div class="centro-flor"></div><div class="tallo" style="height:'+hTallo+'px"></div>';
            f.innerHTML = phtml;
            jardin.appendChild(f);
        }
    </script>
</body>
</html>
